<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XPENG OMNI-HACK v13</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 15px; overflow-y: auto; padding-bottom: 200px; }
        .card { border: 1px solid #333; background: #111; margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
        .card-head { background: #222; padding: 10px; font-weight: bold; border-bottom: 1px solid #333; color: #0f0; }
        .card-body { padding: 10px; display: grid; gap: 10px; }
        button { 
            width: 100%; padding: 18px; background: #2a2a2a; border: 1px solid #444; color: #fff; 
            font-size: 14px; font-weight: bold; text-align: left; border-radius: 6px; cursor: pointer;
        }
        button:active { background: #444; }
        .desc { font-size: 10px; color: #666; margin-top: 4px; }
        .danger { border-left: 5px solid #f00; }
        .jump { border-left: 5px solid #0af; }
    </style>
</head>
<body>

<h2 style="color:#0af; text-align:center;">OMNI-HACK TERMINAL</h2>

<!-- 1. 核心跳板：利用系统原生 Share 菜单 -->
<div class="card">
    <div class="card-head">核心跳板 A：系统级分享注入</div>
    <div class="card-body">
        <button class="jump" onclick="Hacks.triggerShare()">
            📤 唤起原生分享菜单
        </button>
        <div class="desc">原理：利用 Web Share API 强制拉起 Android 原生分享对话框。如果弹出，点击“蓝牙”或“信息”，通常能跳转到系统界面。</div>
    </div>
</div>

<!-- 2. 核心跳板：利用系统原生打印服务 -->
<div class="card">
    <div class="card-head">核心跳板 B：打印预览跳转</div>
    <div class="card-body">
        <button class="jump" onclick="window.print()">
            🖨 唤起原生打印预览
        </button>
        <div class="desc">原理：Android 12 的打印预览界面有“更多设置”，可以跳进原生设置。</div>
    </div>
</div>

<!-- 3. 核心跳板：包管理器漏洞 (利用 Choose Application) -->
<div class="card">
    <div class="card-head">核心跳板 C：软件包安装程序测试</div>
    <div class="card-body">
        <button class="danger" onclick="Hacks.triggerInstall()">
            📦 尝试拉起 PackageInstaller
        </button>
        <div class="desc">如果出现“选择应用”，请看是否有“软件包安装程序”或“安卓系统”。</div>
    </div>
</div>

<!-- 4. 暴力 Activity Fuzzing -->
<div class="card">
    <div class="card-head">核心跳板 D：无权限 Activity 撞击</div>
    <div class="card-body">
        <button class="danger" onclick="Hacks.fuzzNative()">
            🎯 撞击 10 个原生无锁入口
        </button>
        <div class="desc">尝试拉起被忽视的系统子页面（辅助功能、存储管理等）。</div>
    </div>
</div>

<!-- 5. 键盘/搜索绕过 -->
<div class="card">
    <div class="card-head">核心跳板 E：外部搜索联动</div>
    <div class="card-body">
        <button class="jump" onclick="Hacks.webSearch()">
            🌐 唤起全局搜索 (Web Search)
        </button>
    </div>
</div>

<script>
const Hacks = {
    // 1. Web Share API - 这是 Android 12 的原生功能
    triggerShare: async function() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Hack',
                    text: 'Explore System',
                    url: 'http://127.0.0.1'
                });
            } catch (err) { console.log(err); }
        } else {
            // 如果不支持 Web Share，尝试通过 Intent 触发
            window.location.href = "intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=hack;end";
        }
    },

    // 2. Package Installer - 尝试利用安装器界面
    triggerInstall: function() {
        // 尝试以查看文件的名义唤起
        window.location.href = "intent:#Intent;action=android.intent.action.VIEW;data=content://com.android.externalstorage.documents/root/primary;type=application/vnd.android.package-archive;end";
    },

    // 3. Web Search - 调起系统搜索框
    webSearch: function() {
        window.location.href = "intent:#Intent;action=android.intent.action.WEB_SEARCH;S.query=settings;end";
    },

    // 4. 穷举原生 Activity
    fuzzNative: function() {
        const list = [
            "android.settings.ACCESSIBILITY_SETTINGS", // 辅助功能 (极少被封)
            "android.settings.INTERNAL_STORAGE_SETTINGS", // 存储
            "android.settings.IGNORE_BATTERY_OPTIMIZATION_SETTINGS", // 电池优化
            "android.settings.MANAGE_UNKNOWN_APP_SOURCES", // 安装未知应用
            "android.settings.SYNC_SETTINGS", // 账户同步
            "com.android.settings/.SubSettings" // 设置子页
        ];
        list.forEach((act, i) => {
            setTimeout(() => {
                window.location.href = `intent:#Intent;action=${act};flags=0x10000000;end`;
            }, i * 1000);
        });
    }
};
</script>
</body>
</html>
