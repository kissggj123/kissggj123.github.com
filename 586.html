<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XPENG SETTINGS OVERLORD</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; padding-bottom: 200px; }
        h1 { color: #00e5ff; border-bottom: 2px solid #00e5ff; padding-bottom: 10px; }
        
        .btn-grid { display: grid; gap: 15px; }
        
        button {
            width: 100%; padding: 20px; 
            background: #222; border: 1px solid #444; color: #eee;
            font-size: 16px; font-weight: bold; text-align: left;
            border-radius: 8px; position: relative;
        }
        button:active { background: #444; transform: scale(0.98); }
        
        .b-main { border-left: 5px solid #00ff00; }
        .b-sub { border-left: 5px solid #ffcc00; }
        .b-dev { border-left: 5px solid #ff0055; }
        
        .desc { font-size: 10px; color: #888; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>

<h1>⚙️ SETTINGS LAUNCHER</h1>
<p style="color:#aaa; font-size:12px;">点击下方按钮。如果弹出"选择应用"，请尝试寻找类似"设置"或"安卓系统"的图标。</p>

<div class="btn-grid">

    <!-- 1. 核心目标：开发者选项 -->
    <button class="b-dev" onclick="launch('android.settings.DEVELOPMENT_SETTINGS')">
        🔨 开发者选项 (直接入口)
        <div class="desc">Target: Development Settings</div>
    </button>

    <!-- 2. 通用设置首页 -->
    <button class="b-main" onclick="launch('android.settings.SETTINGS')">
        ⚙️ 原生设置首页
        <div class="desc">Target: Settings Main</div>
    </button>

    <!-- 3. 极大概率漏网的子菜单 -->
    <button class="b-sub" onclick="launch('android.settings.APPLICATION_SETTINGS')">
        📦 应用管理
        <div class="desc">很多车机忘记屏蔽这个，进去后点“全部应用”->找到设置->打开</div>
    </button>

    <button class="b-sub" onclick="launch('android.settings.WIFI_SETTINGS')">
        📶 WiFi 设置
        <div class="desc">原生 WiFi 界面，通常包含高级选项</div>
    </button>
    
    <button class="b-sub" onclick="launch('android.settings.BLUETOOTH_SETTINGS')">
        🔵 蓝牙设置
        <div class="desc">原生蓝牙界面</div>
    </button>

    <button class="b-sub" onclick="launch('android.settings.DEVICE_INFO_SETTINGS')">
        ℹ️ 关于本机 (连点版本号)
        <div class="desc">进去狂点 Build Number 开启开发者模式</div>
    </button>

    <button class="b-sub" onclick="launch('android.settings.SECURITY_SETTINGS')">
        🔒 安全设置 (未知来源)
        <div class="desc">允许安装未知应用开关</div>
    </button>

    <!-- 4. 显式调用 (针对 Android 12) -->
    <button class="b-dev" style="background:#220000" onclick="launchExplicit()">
        🚀 显式拉起 com.android.settings
        <div class="desc">直接 Component 调用，不通过 Action 匹配</div>
    </button>

</div>

<script>
    function launch(action) {
        // 构造 Action Intent
        // flag 0x10000000 = NEW_TASK
        // flag 0x04000000 = CLEAR_TOP (防止多重打开)
        const uri = `intent:#Intent;action=${action};flags=0x14000000;end`;
        window.location.href = uri;
    }

    function launchExplicit() {
        // 尝试直接点名 Settings 的主 Activity
        const uri = `intent:#Intent;component=com.android.settings/.Settings;flags=0x14000000;end`;
        window.location.href = uri;
    }
</script>
</body>
</html>
