<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPENG OVERRIDE v25</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; background: #200; border: 2px solid #f00; color: #fff; font-weight: bold; cursor: pointer; }
        .btn:active { background: #f00; }
        .log { height: 200px; border: 1px solid #333; overflow-y: scroll; text-align: left; padding: 10px; font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <h2>🛠 握手协议强制覆盖</h2>
    <div class="log" id="log">Waiting...</div>
    
    <button class="btn" onclick="Override.bypassAuth()">🔓 1. 强改系统属性：免授权模式</button>
    <button class="btn" style="border-color:#0f0; background:#020;" onclick="Override.resetAdb()">🔄 2. 强制重启 adbd 服务</button>
    
    <div style="font-size:10px; color:#555; margin-top:10px;">
        操作：先点按钮1，再点按钮2。然后直接在电脑输入 adb connect，跳过 pair 步骤。
    </div>

<script>
const Log = (m) => {
    const d = document.createElement('div');
    d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
    document.getElementById('log').insertBefore(d, document.getElementById('log').firstChild);
};

const Override = {
    bypassAuth: function() {
        Log("Attempting to disable ADB Authentication...");
        // 核心 Payload：设置 ADB 不需要 RSA 密钥确认
        const cmd = "ro.product.model|setprop ro.adb.secure 0|setprop persist.adb.tcp.port 5555";
        this._inject(cmd);
    },

    resetAdb: function() {
        Log("Restarting adbd service...");
        const cmd = "ro.product.model|setprop ctl.restart adbd";
        this._inject(cmd);
    },

    _inject: function(cmd) {
        // 遍历所有可能的 JS 接口执行
        for(let p in window) {
            try {
                if(typeof window[p] === 'object' && window[p] !== null) {
                    for(let k in window[p]) {
                        if(typeof window[p][k] === 'function') {
                            window[p][k](cmd);
                            window[p][k](cmd, "1");
                        }
                    }
                }
            } catch(e){}
        }
    }
};
</script>
</body>
</html>
