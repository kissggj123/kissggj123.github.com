<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPENG HOT-SWAP INJECTOR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn { 
            display: block; width: 100%; padding: 25px; margin: 10px 0;
            background: #004400; border: 2px solid #0f0; color: #0f0;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .btn:active { background: #0f0; color: #000; }
        .step { color: #fff; font-size: 14px; text-align: left; margin: 10px 0; }
        .highlight { color: #ff0; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🚀 深度热启动注入</h2>
    
    <div class="step">1. 首先：在拨号盘输入 <span class="highlight">*#9925*111#*</span> (直到弹出那个没用的窗体)</div>
    <div class="step">2. 然后：不要重启，迅速切回浏览器</div>
    <div class="step">3. 最后：点击下方对应的注入按钮</div>
</div>

<!-- 方案 A: 纯密码 Flag 注入 -->
<button class="btn" onclick="inject('A')">💉 注入核心密码 (Flag: 26846822)</button>

<!-- 方案 B: 混合系统 Flag (最推荐) -->
<!-- 0x10000000 (New Task) | 26846822 = 295282278 -->
<button class="btn" onclick="inject('B')">🔥 强力覆盖注入 (Flag: 295282278)</button>

<!-- 方案 C: 参数名注入 (针对 Android 12 重定向) -->
<button class="btn" onclick="inject('C')">📦 参数重定向注入 (Extra Mode)</button>

<div id="log" style="font-size: 10px; color: #666; margin-top: 20px; text-align: left;"></div>

<script>
    const pkg = "com.xiaopeng.devtools";
    const target = ".view.usersettings.UserSettingsActivity";
    const main = ".MainActivity";

    function log(msg) {
        document.getElementById('log').innerHTML += "> " + msg + "<br>";
    }

    function inject(mode) {
        let uri = "";
        log("Initiating injection mode " + mode);

        if (mode === 'A') {
            // 纯粹的密码 Flag
            uri = `intent:#Intent;component=${pkg}/${target};flags=26846822;end`;
        } 
        else if (mode === 'B') {
            // 混合系统 Flag (Android 12 启动 Activity 必需)
            uri = `intent:#Intent;component=${pkg}/${target};flags=295282278;end`;
        }
        else if (mode === 'C') {
            // 尝试利用 MainActivity 作为跳板进行重定向
            const inner = encodeURIComponent(`intent:#Intent;component=${pkg}/${target};flags=26846822;end`);
            uri = `intent:#Intent;component=${pkg}${main};S.target=${inner};S.intent=${inner};S.nested=${inner};end`;
        }

        log("Target URI: " + uri);
        
        // 尝试多种拉起手段
        try {
            window.location.href = uri;
            
            const ifr = document.createElement('iframe');
            ifr.src = uri;
            ifr.style.display = 'none';
            document.body.appendChild(ifr);
        } catch(e) {
            log("Error: " + e.message);
        }
    }
</script>

</body>
</html>
